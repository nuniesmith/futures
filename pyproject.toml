[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "futures-lib"
version = "0.1.0"
description = "Futures Trading Co-Pilot — live dashboard, market stats & web UI"
requires-python = ">=3.11"

dependencies = [
    # --- Data & Market ---
    "massive>=2.3.1",
    "websockets>=13.0",
    "yfinance>=0.2.31",

    # --- Data Science ---
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "hmmlearn>=0.3.0",

    # --- Charting (dashboard visuals + CNN training images) ---
    "plotly>=5.18.0",
    "matplotlib>=3.7.0",
    "mplfinance>=0.12.10b0",
    "Pillow>=10.0.0",

    # --- Backtesting & Optimization (live engine) ---
    "backtesting>=0.3.3",
    "optuna>=3.4.0",

    # --- Web / API ---
    "fastapi>=0.108.0",
    "uvicorn>=0.25.0",
    "jinja2>=3.1.0",
    "python-multipart>=0.0.6",
    "requests>=2.31.0",
    "httpx>=0.27.0",
    "slowapi>=0.1.9",

    # --- Storage ---
    "redis>=5.0.0",
    "psycopg[binary]>=3.1.0",
    "sqlalchemy>=2.0.0",

    # --- Observability ---
    "structlog>=24.0.0",
    "prometheus-client>=0.20.0",

    # --- Filesystem watching (CNN model hot-reload) ---
    "watchdog>=4.0.0",

    # --- ONNX (model export + CPU inference) ---
    "onnx>=1.14.0",
    "onnxruntime>=1.16.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pytest-timeout>=2.2.0",
    "pytest-asyncio>=0.20.0",
    "httpx>=0.27.0",
    "ruff>=0.4.0",
    "types-requests>=2.31.0",
]
gpu = [
    # --- GPU training (CUDA 12.8) — trainer image only ---
    "torch>=2.4.0",
    "torchvision>=0.19.0",
    "torchaudio>=2.4.0",
    "tqdm>=4.66.0",
]
server = [
    # --- Trainer HTTP server extras ---
    "uvicorn[standard]>=0.25.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/lib"]

[tool.pytest.ini_options]
testpaths = ["src/tests"]
pythonpath = ["src"]
# -p no:faulthandler: suppresses the C-level abort/core-dump from
# prometheus_client's _mmap_dict C extension during interpreter shutdown.
# All tests pass cleanly — the crash only happens in the atexit/GC
# teardown phase, causing a spurious non-zero exit without this flag.
addopts = "-p no:faulthandler"

[tool.ruff]
src = ["src"]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
]
ignore = [
    "E501", # line-too-long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["lib", "entrypoints"]

[tool.mypy]
python_version = "3.11"
mypy_path = "src"
files = ["src", "scripts"]

# Error reporting — fail on real type errors
ignore_missing_imports = true
warn_unused_ignores = false
warn_redundant_casts = true
warn_return_any = false

# Don't require full annotations everywhere, but check what is annotated
check_untyped_defs = false
disallow_untyped_defs = false
disallow_incomplete_defs = false

# Silence noise from unannotated third-party code
follow_imports = "silent"
