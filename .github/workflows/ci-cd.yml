# =============================================================================
# Futures - CI/CD Pipeline
# =============================================================================
# Automated build, push, and deployment of Futures via Tailscale
#
# Pipeline: Lint → Test → Docker Build & Push (matrix)
#           → Deploy Cloud (engine + web) → Deploy Trainer (home laptop)
#           → Health Checks
#
# Two deployment targets:
#   Cloud Server  — Ubuntu cloud VPS: engine, web, postgres, redis, monitoring
#   Trainer Rig   — Home laptop (CUDA GPU, 64 GB RAM): trainer service only
#                   Also hosts the FKS project — ports don't conflict.
#
# Single DockerHub repo (nuniesmith/futures) with tag-per-service:
#   nuniesmith/futures:engine          — Engine + Data API (amd64 + arm64)
#   nuniesmith/futures:web             — HTMX Dashboard (amd64 + arm64)
#   nuniesmith/futures:trainer         — GPU Training Server (amd64 only)
#   nuniesmith/futures:engine-<sha>    — Pinned engine build
#   nuniesmith/futures:web-<sha>       — Pinned web build
#   nuniesmith/futures:trainer-<sha>   — Pinned trainer build
#   nuniesmith/futures:latest          — Alias for :engine (default pull)
#
# Required Secrets:
#   - TAILSCALE_OAUTH_CLIENT_ID: Tailscale OAuth Client ID
#   - TAILSCALE_OAUTH_SECRET: Tailscale OAuth Secret
#
#   Cloud Server:
#   - PROD_TAILSCALE_IP: Cloud server Tailscale IP
#   - PROD_SSH_KEY: SSH private key for cloud server
#   - PROD_SSH_USER: SSH username (default: actions)
#   - PROD_SSH_PORT: SSH port (default: 22)
#
#   Trainer Rig (home laptop):
#   - TRAINER_TAILSCALE_IP: Trainer laptop Tailscale IP
#   - TRAINER_SSH_KEY: SSH private key for trainer laptop
#   (SSH user and port are the same as PROD_SSH_USER / PROD_SSH_PORT)
#
#   Docker:
#   - DOCKER_USERNAME: Docker Hub username
#   - DOCKER_TOKEN: Docker Hub access token
#
#   Notifications:
#   - DISCORD_WEBHOOK_ACTIONS: Discord webhook for CI/CD notifications
#
#   API Keys (injected into prod .env on cloud server):
#   - XAI_API_KEY: xAI (Grok) API key
#   - MASSIVE_API_KEY: Massive API key
#   - KRAKEN_API_KEY: Kraken API key
#   - API_KEY: Shared secret for web ↔ engine auth (X-API-Key header)
#   - TRAINER_API_KEY: Shared secret for engine ↔ trainer auth (Bearer token)
# =============================================================================

name: 🚀 CI/CD Pipeline

on:
    push:
        branches: [main]
        paths-ignore:
            - "**.md"
            - "LICENSE"
            - ".gitignore"
            - "docs/**"
    pull_request:
        branches: [main]
    workflow_dispatch:
        inputs:
            skip_tests:
                description: "Skip tests (build only)"
                required: false
                type: boolean
                default: false
            skip_docker:
                description: "Skip Docker build (test only)"
                required: false
                type: boolean
                default: false
            skip_deploy:
                description: "Skip deployment (build only)"
                required: false
                type: boolean
                default: false

permissions:
    contents: read
    packages: write
    checks: write

env:
    PYTHON_VERSION: "3.13"
    REGISTRY: docker.io
    IMAGE_NAME: nuniesmith/futures

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

defaults:
    run:
        shell: bash

jobs:
    # =========================================================================
    # Stage 1: Lint & Format
    # =========================================================================
    lint:
        name: ✨ Lint & Format
        runs-on: ubuntu-latest
        timeout-minutes: 10
        if: ${{ !inputs.skip_tests }}
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 📣 Notify build started
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "🔨 Futures CI/CD Started"
                  description: "Running lint and format checks"
                  status: started
                  include-repo-info: "true"

            - name: 🐍 Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: 📦 Install linting tools
              run: |
                  python -m pip install --upgrade pip
                  pip install ruff mypy types-requests

            - name: ✨ Run Ruff linting
              run: |
                  echo "🔍 Running Ruff linter..."
                  ruff check . --output-format=github
                  ruff format --check .

            - name: 📦 Install project (for mypy to resolve imports)
              run: |
                  pip install -e ".[dev]" --no-deps 2>/dev/null || pip install -e . --no-deps 2>/dev/null || true

            - name: 🔍 Run mypy type check
              run: |
                  echo "🔍 Running mypy type checker..."
                  mypy src scripts

    # =========================================================================
    # Stage 2: Test
    # =========================================================================
    test:
        name: 🧪 Test
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: ${{ !inputs.skip_tests }}
        needs: lint
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🐍 Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: "pip"

            - name: 📦 Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install pytest pytest-cov pytest-asyncio pytest-timeout
                  if [ -f pyproject.toml ]; then pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true; fi

            - name: 🧪 Run tests
              run: |
                  pytest --cov=. --cov-report=xml --cov-report=term-missing -v

            - name: ✅ Notify tests passed
              if: success()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "✅ Futures Tests Passed"
                  description: "All tests and lint checks passed"
                  status: success

            - name: ❌ Notify tests failed
              if: failure()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "❌ Futures Tests Failed"
                  description: "Tests or lint checks failed"
                  status: failure
                  fields: '[{"name": "Workflow", "value": "[View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}]'

    # =========================================================================
    # Stage 3: Build & Push Docker Images
    # =========================================================================
    #
    # Single DockerHub repo (nuniesmith/futures) with tag-per-service.
    # Each matrix entry produces two tags:
    #   :engine           (rolling latest for that service)
    #   :engine-abc1234   (pinned to commit SHA)
    # The engine build also tags :latest as the default pull target.
    #
    # Builds run in parallel via matrix strategy:
    #   engine  — Combined FastAPI data service + engine worker (arm64 + amd64)
    #   web     — HTMX dashboard reverse-proxy (arm64 + amd64)
    #   trainer — GPU CNN training server (amd64 only — CUDA base image)
    # =========================================================================
    docker:
        name: "🐳 Build :${{ matrix.service }}"
        needs: test
        runs-on: ubuntu-latest
        timeout-minutes: 60
        if: |
            github.event_name == 'push' && github.ref == 'refs/heads/main'
            && (github.event_name != 'workflow_dispatch' || inputs.skip_docker != true)
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: data
                      dockerfile: docker/data/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: true
                    - service: engine
                      dockerfile: docker/engine/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: false
                    - service: web
                      dockerfile: docker/web/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: false
                    - service: trainer
                      dockerfile: docker/trainer/Dockerfile
                      platforms: linux/amd64
                      is_default: false
                    - service: prometheus
                      dockerfile: docker/monitoring/prometheus/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: false
                    - service: grafana
                      dockerfile: docker/monitoring/grafana/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: false
                    - service: charting
                      dockerfile: docker/charting/Dockerfile
                      platforms: linux/amd64,linux/arm64
                      is_default: false
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🔢 Compute short SHA
              id: vars
              run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

            - name: 🐳 Build and Push — :${{ matrix.service }}
              uses: nuniesmith/actions/.github/actions/docker-build-push@main
              with:
                  image-name: ${{ env.IMAGE_NAME }}
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_TOKEN }}
                  dockerfile: ${{ matrix.dockerfile }}
                  context: .
                  platforms: ${{ matrix.platforms }}
                  push: "true"
                  tags: |
                      type=raw,value=${{ matrix.service }}
                      type=raw,value=${{ matrix.service }}-${{ steps.vars.outputs.sha_short }}
                      type=raw,value=latest,enable=${{ matrix.is_default }}

            - name: ✅ Notify :${{ matrix.service }} pushed
              if: success()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "🐳 :${{ matrix.service }} Image Pushed"
                  description: "Docker image pushed to Docker Hub"
                  status: success
                  fields: '[{"name": "Tags", "value": "`${{ env.IMAGE_NAME }}:${{ matrix.service }}`\n`${{ env.IMAGE_NAME }}:${{ matrix.service }}-${{ steps.vars.outputs.sha_short }}`", "inline": true}, {"name": "Platforms", "value": "`${{ matrix.platforms }}`", "inline": true}]'

            - name: ❌ Notify :${{ matrix.service }} build failed
              if: failure()
              continue-on-error: true
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "❌ :${{ matrix.service }} Docker Build Failed"
                  description: "Failed to build or push :${{ matrix.service }} image"
                  status: failure
                  fields: '[{"name": "Dockerfile", "value": "`${{ matrix.dockerfile }}`", "inline": true}, {"name": "Workflow", "value": "[View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}]'

    # =========================================================================
    # Stage 4a: Deploy to Cloud Server (engine + web via Tailscale)
    # =========================================================================
    #
    # Connects to the cloud Ubuntu server over Tailscale VPN, then uses the
    # shared ssh-deploy action to pull the freshly-pushed :engine and :web
    # images and restart services via docker compose.
    #
    # The :trainer image is NOT deployed here — it goes to the home laptop.
    #
    # Gates:
    #   - Only runs on push to main (same gate as docker stage)
    #   - Only runs after ALL docker matrix jobs succeed
    #   - Can be skipped manually via workflow_dispatch skip_deploy input
    # =========================================================================
    deploy:
        name: ☁️ Deploy Cloud (data + engine + web)
        needs: docker
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: |
            github.ref == 'refs/heads/main'
            && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
            && inputs.skip_deploy != true
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🔢 Compute short SHA
              id: vars
              run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

            - name: 🔌 Connect to Tailscale
              id: tailscale
              uses: nuniesmith/actions/.github/actions/tailscale-connect@main
              with:
                  oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
                  target-ip: ${{ secrets.PROD_TAILSCALE_IP }}
                  target-ssh-port: ${{ secrets.PROD_SSH_PORT || '22' }}

            - name: 🚀 Deploy via SSH
              id: deploy
              if: steps.tailscale.outputs.connected == 'true'
              uses: nuniesmith/actions/.github/actions/ssh-deploy@main
              with:
                  host: ${{ secrets.PROD_TAILSCALE_IP }}
                  port: ${{ secrets.PROD_SSH_PORT || '22' }}
                  username: ${{ secrets.PROD_SSH_USER || 'actions' }}
                  ssh-key: ${{ secrets.PROD_SSH_KEY }}
                  project-path: ~/futures
                  git-pull: false
                  git-branch: main
                  docker-prune: false
                  pre-deploy-command: |
                      echo "📦 Preparing Futures deployment on cloud server..."

                      # Handle git repository setup
                      if [ ! -d "$HOME/futures/.git" ]; then
                        if [ -d "$HOME/futures" ]; then
                          echo "📁 Directory exists but is not a git repo — initializing..."
                          cd ~/futures
                          git init
                          git remote add origin https://github.com/${{ github.repository }}.git
                          git fetch origin
                          git checkout -f main
                          git branch --set-upstream-to=origin/main main
                        else
                          echo "📥 First deployment — cloning repository..."
                          git clone https://github.com/${{ github.repository }}.git ~/futures
                          cd ~/futures
                          git checkout main
                        fi
                      else
                        cd ~/futures
                        echo "📥 Pulling latest changes..."
                        git fetch origin
                        git checkout main
                        git pull origin main
                      fi

                      # Ensure scripts are executable
                      find . -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

                      # Create .env file if it doesn't exist
                      if [ ! -f ".env" ]; then
                        echo "📝 Creating default .env..."
                        cat > .env <<'ENVEOF'
                      # Futures Environment Configuration
                      PYTHONUNBUFFERED=1
                      LOG_LEVEL=info
                      ENVEOF
                        chmod 600 .env
                        echo "✅ Created .env file"
                      fi

                      # Generate database passwords once — never overwrite existing values
                      # so that a redeployment doesn't break a live database
                      generate_env_secret() {
                        local key="$1"
                        if ! grep -q "^${key}=" .env 2>/dev/null; then
                          local val
                          val="$(openssl rand -base64 32 | tr -d '/+=' | head -c 40)"
                          echo "${key}=${val}" >> .env
                          echo "🔑 Generated ${key}"
                        else
                          echo "🔑 ${key} already set — skipping"
                        fi
                      }
                      generate_env_secret "POSTGRES_PASSWORD"
                      generate_env_secret "REDIS_PASSWORD"
                      chmod 600 .env
                      echo "✅ .env ready"

                      # Upsert API keys — always overwrite so rotated secrets stay current
                      echo "🔑 Injecting API keys into .env..."
                      upsert_env() {
                        local key="$1" val="$2"
                        if grep -q "^${key}=" .env 2>/dev/null; then
                          sed -i "s|^${key}=.*|${key}=${val}|" .env
                        else
                          echo "${key}=${val}" >> .env
                        fi
                      }
                      upsert_env "XAI_API_KEY"        "${{ secrets.XAI_API_KEY }}"
                      upsert_env "MASSIVE_API_KEY"     "${{ secrets.MASSIVE_API_KEY }}"
                      upsert_env "KRAKEN_API_KEY"      "${{ secrets.KRAKEN_API_KEY }}"
                      upsert_env "KRAKEN_API_SECRET"   "${{ secrets.KRAKEN_API_SECRET }}"
                      upsert_env "API_KEY"             "${{ secrets.API_KEY }}"
                      upsert_env "TRAINER_API_KEY"     "${{ secrets.TRAINER_API_KEY }}"
                      upsert_env "TRAINER_SERVICE_URL" "http://${{ secrets.TRAINER_TAILSCALE_IP }}:8200"

                      chmod 600 .env
                      echo "✅ API keys injected"

                      # Create required directories
                      echo "📁 Ensuring data directories exist..."
                      mkdir -p data config
                      chmod 755 data config
                      echo "✅ Directories ready"

                  deploy-command: |
                      cd ~/futures

                      # Remove stale docker-compose.prod.yml if it exists — we use docker-compose.yml exclusively
                      if [ -f docker-compose.prod.yml ]; then
                        echo "🧹 Removing stale docker-compose.prod.yml..."
                        rm -f docker-compose.prod.yml
                      fi

                      # Stop existing services
                      echo "🐳 Stopping existing services..."
                      docker compose down 2>/dev/null || true

                      # Log in to Docker Hub and pull latest per-service images
                      echo "🐳 Pulling latest images from Docker Hub..."
                      echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin 2>/dev/null || true

                      echo "==> Pulling :data image..."
                      docker pull ${{ env.IMAGE_NAME }}:data

                      echo "==> Pulling :engine image..."
                      docker pull ${{ env.IMAGE_NAME }}:engine

                      echo "==> Pulling :web image..."
                      docker pull ${{ env.IMAGE_NAME }}:web

                      echo "==> Pulling :charting image..."
                      docker pull ${{ env.IMAGE_NAME }}:charting

                      # Start services (trainer goes to the home laptop — not deployed here)
                      # postgres and redis must be listed explicitly — when service names are
                      # given, Compose does NOT auto-start depends_on targets that aren't running.
                      echo "🚀 Starting postgres, redis, data, engine, web and charting services..."
                      docker compose up -d --no-build --remove-orphans postgres redis data engine web charting prometheus grafana

                  post-deploy-command: |
                      cd ~/futures

                      echo ""
                      echo "📊 Container status:"
                      docker compose ps postgres redis data engine web charting prometheus grafana 2>/dev/null || \
                        docker ps --filter "name=futures" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

                      echo ""
                      echo "📊 Storage usage:"
                      df -h / | grep -v Filesystem
                      docker system df 2>/dev/null || true

                      echo ""
                      echo "🧹 Pruning dangling Docker images..."
                      docker image prune -f 2>/dev/null || true

                      echo ""
                      echo "🎯 Architecture:"
                      uname -m
                      docker info --format '{{.Architecture}}' 2>/dev/null || true

                      echo ""
                      echo "✅ Cloud server deployment complete!"

            - name: 🏥 Run Health Checks
              id: health-checks
              if: always() && steps.deploy.outcome == 'success'
              uses: nuniesmith/actions/.github/actions/health-check@main
              with:
                  containers: futures
                  ssh-host: ${{ secrets.PROD_TAILSCALE_IP }}
                  ssh-port: ${{ secrets.PROD_SSH_PORT || '22' }}
                  ssh-user: ${{ secrets.PROD_SSH_USER || 'actions' }}
                  ssh-key: ${{ secrets.PROD_SSH_KEY }}
                  initial-delay: 15
                  retry-count: 3
                  retry-delay: 10
                  fail-on-unhealthy: false

            - name: 📣 Notify deployment
              if: always()
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              continue-on-error: true
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "${{ steps.deploy.outcome == 'success' && '☁️ Futures Deployed to Cloud' || '❌ Futures Cloud Deploy Failed' }}"
                  description: "${{ steps.deploy.outcome == 'success' && 'Data + Engine + Web updated on cloud server' || 'Failed to deploy Futures to cloud server' }}"
                  status: ${{ steps.deploy.outcome == 'success' && 'success' || 'failure' }}
                  include-repo-info: "true"
                  fields: |
                      [
                        {"name": "Platform", "value": "☁️ Cloud Ubuntu (amd64)", "inline": true},
                        {"name": "Images", "value": "`${{ env.IMAGE_NAME }}:data`\n`${{ env.IMAGE_NAME }}:engine`\n`${{ env.IMAGE_NAME }}:web`", "inline": true},
                        {"name": "Commit", "value": "`${{ steps.vars.outputs.sha_short }}`", "inline": true},
                        {"name": "Network", "value": "🔒 Tailscale VPN", "inline": true},
                        {"name": "Health", "value": "${{ steps.health-checks.outputs.healthy == 'true' && '✅ Healthy' || '⚠️ Check logs' }}", "inline": true}
                      ]

    # =========================================================================
    # Stage 4b: Deploy Trainer to Home Laptop (GPU rig via Tailscale)
    # =========================================================================
    #
    # Connects to the home laptop (CUDA GPU + 64 GB RAM) over Tailscale VPN,
    # pulls the :trainer image and restarts it with the training profile.
    #
    # This machine also runs the FKS project — ports don't interfere:
    #   Futures trainer: 8200
    #
    # SSH user and port are the same as the cloud server; only the IP and
    # SSH key differ (TRAINER_TAILSCALE_IP, TRAINER_SSH_KEY).
    #
    # Gates: same as cloud deploy — runs in parallel after docker stage.
    # =========================================================================
    deploy-trainer:
        name: 🏋️ Deploy Trainer (home GPU)
        needs: docker
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: |
            github.ref == 'refs/heads/main'
            && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
            && inputs.skip_deploy != true
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🔢 Compute short SHA
              id: vars
              run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

            - name: 🔌 Connect to Tailscale
              id: tailscale
              uses: nuniesmith/actions/.github/actions/tailscale-connect@main
              with:
                  oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
                  target-ip: ${{ secrets.TRAINER_TAILSCALE_IP }}
                  target-ssh-port: ${{ secrets.PROD_SSH_PORT || '22' }}

            - name: 🏋️ Deploy Trainer via SSH
              id: deploy-trainer
              if: steps.tailscale.outputs.connected == 'true'
              uses: nuniesmith/actions/.github/actions/ssh-deploy@main
              with:
                  host: ${{ secrets.TRAINER_TAILSCALE_IP }}
                  port: ${{ secrets.PROD_SSH_PORT || '22' }}
                  username: ${{ secrets.PROD_SSH_USER || 'actions' }}
                  ssh-key: ${{ secrets.TRAINER_SSH_KEY }}
                  project-path: ~/futures
                  git-pull: false
                  git-branch: main
                  docker-prune: false
                  pre-deploy-command: |
                      echo "📦 Preparing Trainer deployment on home GPU rig..."

                      # Handle git repository setup
                      if [ ! -d "$HOME/futures/.git" ]; then
                        if [ -d "$HOME/futures" ]; then
                          echo "📁 Directory exists but is not a git repo — initializing..."
                          cd ~/futures
                          git init
                          git remote add origin https://github.com/${{ github.repository }}.git
                          git fetch origin
                          git checkout -f main
                          git branch --set-upstream-to=origin/main main
                        else
                          echo "📥 First deployment — cloning repository..."
                          git clone https://github.com/${{ github.repository }}.git ~/futures
                          cd ~/futures
                          git checkout main
                        fi
                      else
                        cd ~/futures
                        echo "📥 Pulling latest changes..."
                        git fetch origin
                        git checkout main
                        git pull origin main
                      fi

                      # Ensure scripts are executable
                      find . -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

                      # Create .env file if it doesn't exist
                      if [ ! -f ".env" ]; then
                        echo "📝 Creating default .env..."
                        cat > .env <<'ENVEOF'
                      # Futures Trainer Environment Configuration
                      PYTHONUNBUFFERED=1
                      LOG_LEVEL=info
                      ENVEOF
                        chmod 600 .env
                        echo "✅ Created .env file"
                      fi

                      # Upsert env vars needed by trainer
                      # The trainer fetches ALL market data from the engine over
                      # Tailscale — no direct MASSIVE/KRAKEN API keys needed.
                      echo "🔑 Injecting environment variables into .env..."
                      upsert_env() {
                        local key="$1" val="$2"
                        if grep -q "^${key}=" .env 2>/dev/null; then
                          sed -i "s|^${key}=.*|${key}=${val}|" .env
                        else
                          echo "${key}=${val}" >> .env
                        fi
                      }
                      upsert_env "ENGINE_DATA_URL"     "http://${{ secrets.PROD_TAILSCALE_IP }}:8100"
                      upsert_env "API_KEY"             "${{ secrets.API_KEY }}"
                      upsert_env "TRAINER_API_KEY"     "${{ secrets.API_KEY }}"

                      # Clean up legacy keys the trainer no longer needs
                      sed -i '/^MASSIVE_API_KEY=/d'   .env 2>/dev/null || true
                      sed -i '/^KRAKEN_API_KEY=/d'    .env 2>/dev/null || true
                      sed -i '/^KRAKEN_API_SECRET=/d' .env 2>/dev/null || true
                      sed -i '/^POSTGRES_PASSWORD=/d' .env 2>/dev/null || true
                      sed -i '/^REDIS_PASSWORD=/d'    .env 2>/dev/null || true

                      chmod 600 .env
                      echo "✅ Environment variables injected (ENGINE_DATA_URL + API_KEY)"

                      # Create required directories
                      echo "📁 Ensuring data directories exist..."
                      mkdir -p data models dataset config scripts
                      chmod 755 data models dataset config scripts
                      echo "✅ Directories ready"

                      # Verify NVIDIA GPU is available
                      echo ""
                      echo "🎮 GPU check:"
                      nvidia-smi --query-gpu=name,memory.total,driver_version --format=csv,noheader 2>/dev/null || echo "⚠️ nvidia-smi not available (GPU may still work in container)"

                  deploy-command: |
                      cd ~/futures

                      # Stop existing trainer service (leave other FKS services untouched)
                      echo "🐳 Stopping existing trainer service..."
                      docker compose -f docker-compose.trainer.yml stop trainer 2>/dev/null || true
                      docker compose -f docker-compose.trainer.yml rm -f trainer 2>/dev/null || true
                      # Also clean up any old profile-based containers
                      docker compose --profile training stop trainer 2>/dev/null || true
                      docker compose --profile training rm -f trainer 2>/dev/null || true

                      # Log in to Docker Hub and pull latest trainer image
                      echo "🐳 Pulling latest trainer image from Docker Hub..."
                      echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin 2>/dev/null || true

                      echo "==> Pulling :trainer image..."
                      docker pull ${{ env.IMAGE_NAME }}:trainer

                      # Start trainer with standalone compose file (no postgres/redis deps)
                      echo "🏋️ Starting trainer service..."
                      docker compose -f docker-compose.trainer.yml up -d --no-build trainer

                  post-deploy-command: |
                      cd ~/futures

                      echo ""
                      echo "📊 Trainer container status:"
                      docker compose -f docker-compose.trainer.yml ps trainer 2>/dev/null || \
                        docker ps --filter "name=trainer" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

                      echo ""
                      echo "📊 Storage usage:"
                      df -h / | grep -v Filesystem
                      docker system df 2>/dev/null || true

                      echo ""
                      echo "🧹 Pruning dangling Docker images..."
                      docker image prune -f 2>/dev/null || true

                      echo ""
                      echo "🎮 GPU status:"
                      nvidia-smi 2>/dev/null || echo "nvidia-smi not available on host"

                      echo ""
                      echo "🎯 Architecture:"
                      uname -m
                      docker info --format '{{.Architecture}}' 2>/dev/null || true

                      echo ""
                      echo "✅ Trainer deployment complete!"

            - name: 🏥 Run Trainer Health Check
              id: health-checks
              if: always() && steps.deploy-trainer.outcome == 'success'
              uses: nuniesmith/actions/.github/actions/health-check@main
              with:
                  containers: trainer
                  ssh-host: ${{ secrets.TRAINER_TAILSCALE_IP }}
                  ssh-port: ${{ secrets.PROD_SSH_PORT || '22' }}
                  ssh-user: ${{ secrets.PROD_SSH_USER || 'actions' }}
                  ssh-key: ${{ secrets.TRAINER_SSH_KEY }}
                  initial-delay: 30
                  retry-count: 3
                  retry-delay: 15
                  fail-on-unhealthy: false

            - name: 📣 Notify trainer deployment
              if: always()
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              continue-on-error: true
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "${{ steps.deploy-trainer.outcome == 'success' && '🏋️ Trainer Deployed to GPU Rig' || '❌ Trainer Deploy Failed' }}"
                  description: "${{ steps.deploy-trainer.outcome == 'success' && 'Trainer service updated on home GPU laptop' || 'Failed to deploy Trainer to home GPU laptop' }}"
                  status: ${{ steps.deploy-trainer.outcome == 'success' && 'success' || 'failure' }}
                  include-repo-info: "true"
                  fields: |
                      [
                        {"name": "Platform", "value": "🏋️ Home GPU Rig (amd64 / CUDA)", "inline": true},
                        {"name": "Image", "value": "`${{ env.IMAGE_NAME }}:trainer`", "inline": true},
                        {"name": "Commit", "value": "`${{ steps.vars.outputs.sha_short }}`", "inline": true},
                        {"name": "Network", "value": "🔒 Tailscale VPN", "inline": true},
                        {"name": "Health", "value": "${{ steps.health-checks.outputs.healthy == 'true' && '✅ Healthy' || '⚠️ Check logs' }}", "inline": true}
                      ]

    # =========================================================================
    # Pipeline Summary
    # =========================================================================
    summary:
        name: 📊 Pipeline Summary
        runs-on: ubuntu-latest
        timeout-minutes: 5
        needs: [lint, test, docker, deploy, deploy-trainer]
        if: always()
        steps:
            - name: 📊 Generate summary
              run: |
                  SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)

                  echo "## 📊 Futures CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
                  echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
                  echo "| ✨ Lint & Format | \`${{ needs.lint.result }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🧪 Test | \`${{ needs.test.result }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🐳 Docker Build & Push | \`${{ needs.docker.result }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| ☁️ Deploy Cloud (data + engine + web) | \`${{ needs.deploy.result }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🏋️ Deploy Trainer (home GPU) | \`${{ needs.deploy-trainer.result }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY

                  if [ "${{ needs.lint.result }}" = "success" ] && \
                     [ "${{ needs.test.result }}" = "success" ] && \
                     [ "${{ needs.docker.result }}" = "success" ]; then
                    CLOUD="${{ needs.deploy.result }}"
                    TRAINER="${{ needs.deploy-trainer.result }}"
                    if [ "$CLOUD" = "success" ] && [ "$TRAINER" = "success" ]; then
                      echo "### ✅ All stages completed — cloud + trainer updated!" >> $GITHUB_STEP_SUMMARY
                    elif [ "$CLOUD" = "success" ] && [ "$TRAINER" = "failure" ]; then
                      echo "### ⚠️ Cloud deployed but trainer deploy failed — check TRAINER_TAILSCALE_IP / TRAINER_SSH_KEY" >> $GITHUB_STEP_SUMMARY
                    elif [ "$CLOUD" = "failure" ] && [ "$TRAINER" = "success" ]; then
                      echo "### ⚠️ Trainer deployed but cloud deploy failed — check PROD_TAILSCALE_IP / PROD_SSH_KEY" >> $GITHUB_STEP_SUMMARY
                    elif [ "$CLOUD" = "failure" ] && [ "$TRAINER" = "failure" ]; then
                      echo "### ❌ Both deploys failed — check Tailscale / SSH secrets" >> $GITHUB_STEP_SUMMARY
                    elif [ "$CLOUD" = "skipped" ] && [ "$TRAINER" = "skipped" ]; then
                      echo "### ✅ Build + test passed (deploys skipped)" >> $GITHUB_STEP_SUMMARY
                    else
                      echo "### ✅ Build passed — Cloud: ${CLOUD}, Trainer: ${TRAINER}" >> $GITHUB_STEP_SUMMARY
                    fi
                  elif [ "${{ needs.lint.result }}" = "failure" ]; then
                    echo "### ❌ Pipeline failed at lint stage" >> $GITHUB_STEP_SUMMARY
                    echo "Fix linting/formatting errors before proceeding." >> $GITHUB_STEP_SUMMARY
                  elif [ "${{ needs.test.result }}" = "failure" ]; then
                    echo "### ❌ Pipeline failed at test stage" >> $GITHUB_STEP_SUMMARY
                    echo "Fix failing tests before deployment can proceed." >> $GITHUB_STEP_SUMMARY
                  elif [ "${{ needs.docker.result }}" = "failure" ]; then
                    echo "### ❌ Pipeline failed at Docker build stage" >> $GITHUB_STEP_SUMMARY
                    echo "Check Dockerfiles and build configuration." >> $GITHUB_STEP_SUMMARY
                  elif [ "${{ needs.docker.result }}" = "skipped" ]; then
                    echo "### ⏭️ Docker build skipped" >> $GITHUB_STEP_SUMMARY
                    echo "Docker builds only run on push to main." >> $GITHUB_STEP_SUMMARY
                  fi

                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### 🐳 Docker Tags" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Service | Tag | Pinned Tag | Platforms | Deploy Target |" >> $GITHUB_STEP_SUMMARY
                  echo "|---------|-----|------------|-----------|---------------|" >> $GITHUB_STEP_SUMMARY
                  echo "| Data | \`${{ env.IMAGE_NAME }}:data\` | \`:data-${SHA_SHORT}\` | amd64, arm64 | ☁️ Cloud |" >> $GITHUB_STEP_SUMMARY
                  echo "| Engine | \`${{ env.IMAGE_NAME }}:engine\` | \`:engine-${SHA_SHORT}\` | amd64, arm64 | ☁️ Cloud |" >> $GITHUB_STEP_SUMMARY
                  echo "| Web | \`${{ env.IMAGE_NAME }}:web\` | \`:web-${SHA_SHORT}\` | amd64, arm64 | ☁️ Cloud |" >> $GITHUB_STEP_SUMMARY
                  echo "| Trainer | \`${{ env.IMAGE_NAME }}:trainer\` | \`:trainer-${SHA_SHORT}\` | amd64 | 🏋️ Home GPU |" >> $GITHUB_STEP_SUMMARY
                  echo "| Default (:latest) | \`${{ env.IMAGE_NAME }}:latest\` | — | amd64, arm64 | ☁️ Cloud |" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
                  echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
                  echo "| 🐍 Python | \`${{ env.PYTHON_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 📦 Repo | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🌿 Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🔗 Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

            - name: ❌ Fail on critical errors
              if: needs.lint.result == 'failure' || needs.test.result == 'failure' || needs.docker.result == 'failure' || needs.deploy.result == 'failure' || needs.deploy-trainer.result == 'failure'
              run: |
                  echo "❌ Pipeline had failures"
                  echo "  Lint:    ${{ needs.lint.result }}"
                  echo "  Test:    ${{ needs.test.result }}"
                  echo "  Docker:  ${{ needs.docker.result }}"
                  echo "  Cloud:   ${{ needs.deploy.result }}"
                  echo "  Trainer: ${{ needs.deploy-trainer.result }}"
                  exit 1
