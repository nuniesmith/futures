# =============================================================================
# Prometheus Configuration — Futures Trading Co-Pilot
# =============================================================================
#
# Scrapes metrics from the data-service at /metrics/prometheus.
#
# Usage:
#   Add the prometheus service to docker-compose.yml:
#     prometheus:
#       image: prom/prometheus:v2.53.0
#       volumes:
#         - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
#         - prometheus_data:/prometheus
#       ports:
#         - "9090:9090"
#       depends_on:
#         data:
#           condition: service_healthy
#
# =============================================================================

# =============================================================================
# Alert Rules
# =============================================================================
rule_files:
    - /etc/prometheus/alert_rules.yml

global:
    scrape_interval: 15s
    evaluation_interval: 15s
    scrape_timeout: 10s

    external_labels:
        cluster: "futures-copilot"
        environment: "production"

# =============================================================================
# Scrape Configs
# =============================================================================
scrape_configs:
    # ---------------------------------------------------------------------------
    # Data Service — FastAPI metrics (request count, latency, SSE, etc.)
    # ---------------------------------------------------------------------------
    - job_name: "data-service"
      metrics_path: /metrics/prometheus
      scrape_interval: 10s
      static_configs:
          - targets: ["data:8000"]
            labels:
                service: "data-service"
                component: "api"

      # If API key auth is enabled, add it here:
      # authorization:
      #   type: "ApiKey"
      #   credentials: "${API_KEY}"
      # Or use headers via a relabel/proxy approach.

    # ---------------------------------------------------------------------------
    # Prometheus self-monitoring
    # ---------------------------------------------------------------------------
    - job_name: "prometheus"
      static_configs:
          - targets: ["localhost:9090"]
            labels:
                service: "prometheus"

    # ---------------------------------------------------------------------------
    # NinjaTrader Bridge — scraped directly from the Bridge HTTP listener
    # ---------------------------------------------------------------------------
    # The Bridge strategy exposes Prometheus metrics at /metrics on its
    # signal listener port.  Since NinjaTrader runs on the Windows host
    # (not in Docker), we use host.docker.internal to reach it.
    #
    # Metrics exposed:
    #   bridge_up, bridge_listener_up, bridge_ruby_attached,
    #   bridge_signalbus_active, bridge_positions_count,
    #   bridge_cash_balance, bridge_unrealized_pnl, bridge_realized_pnl,
    #   bridge_risk_blocked, bridge_signals_received_total,
    #   bridge_signals_executed_total, bridge_signals_rejected_total,
    #   bridge_exits_executed_total, bridge_orders_filled_total,
    #   bridge_orders_rejected_total, bridge_signalbus_enqueued_total,
    #   bridge_signalbus_drained_total, bridge_signalbus_pending,
    #   bridge_heartbeats_total, bridge_position_pushes_total,
    #   bridge_uptime_seconds, bridge_info
    # ---------------------------------------------------------------------------
    - job_name: "ninjatrader-bridge"
      metrics_path: /metrics
      scrape_interval: 15s
      scrape_timeout: 5s
      static_configs:
          - targets: ["host.docker.internal:5680"]
            labels:
                service: "ninjatrader-bridge"
                component: "trading"

      # The Bridge may not always be running (only during trading hours).
      # Mark the target as optional so Prometheus doesn't fire alerts
      # during off-hours when NT8 is closed.
      # honor_timestamps: true

    # ---------------------------------------------------------------------------
    # Redis Exporter (optional — add oliver006/redis_exporter to compose)
    # ---------------------------------------------------------------------------
    # - job_name: "redis"
    #   static_configs:
    #     - targets: ["redis-exporter:9121"]
    #       labels:
    #         service: "redis"

    # ---------------------------------------------------------------------------
    # Postgres Exporter (optional — add prometheuscommunity/postgres-exporter)
    # ---------------------------------------------------------------------------
    # - job_name: "postgres"
    #   static_configs:
    #     - targets: ["postgres-exporter:9187"]
    #       labels:
    #         service: "postgres"
