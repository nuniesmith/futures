# =============================================================================
# Futures Trading Co-Pilot — Docker Compose
# =============================================================================
#
# Services:
#   postgres   — durable storage (journal, historical opts, alerts)
#   redis      — hot cache (latest Ruby metrics, live positions, 1m bars)
#   engine     — FastAPI REST + SSE (port 8100) + background computation worker
#   web        — HTMX dashboard frontend; reverse-proxies to engine (port 8180)
#   prometheus — metrics collection & alerting  [monitoring profile]
#   grafana    — dashboards & visualization      [monitoring profile]
#
# CNN model files are pulled from the orb repo (github.com/nuniesmith/orb):
#
#   bash scripts/sync_models.sh            # download latest champion model
#   bash scripts/sync_models.sh --restart  # download + restart engine
#   bash scripts/sync_models.sh --check    # check if models are current
#
# Usage:
#   docker compose up -d --build
#   docker compose --profile monitoring up -d --build
#   docker compose logs -f engine
#   docker compose logs -f web
#   docker compose ps
#
# =============================================================================

services:
    # -------------------------------------------------------------------------
    # PostgreSQL — durable storage
    # -------------------------------------------------------------------------
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        ports:
            - "5433:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-futures_user}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
            POSTGRES_DB: ${POSTGRES_DB:-futures_db}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-futures_user} -d ${POSTGRES_DB:-futures_db}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    # -------------------------------------------------------------------------
    # Redis — hot cache for real-time data
    # -------------------------------------------------------------------------
    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - "6380:6379"
        volumes:
            - redis_data:/data
        command:
            - redis-server
            - --requirepass
            - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
            - --appendonly
            - "yes"
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
            interval: 10s
            timeout: 3s
            retries: 3

    # -------------------------------------------------------------------------
    # Engine — FastAPI REST + SSE API (port 8100) + background computation worker
    #
    # Runs two processes via docker/engine/entrypoint.sh:
    #   1. uvicorn  — serves REST API and SSE (lib.services.data.main)
    #   2. engine   — DashboardEngine, Ruby modules, optimization, backtesting,
    #                 daily focus computation, session-aware scheduling
    #
    # Both share the same src/ tree, Redis connection, and Postgres connection.
    # If either process exits, the container exits and Docker restarts it.
    #
    # CNN training lives in the orb repo (github.com/nuniesmith/orb).
    # Pull the latest trained model with:  bash scripts/sync_models.sh
    # -------------------------------------------------------------------------
    engine:
        build:
            context: .
            dockerfile: docker/engine/Dockerfile
        restart: unless-stopped
        shm_size: 2gb
        ports:
            - "8100:8000"
        env_file:
            - .env
        environment:
            - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
            - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-futures_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-futures_db}
            - DB_PATH=/app/data/futures_journal.db
            - DATA_SERVICE_HOST=0.0.0.0
            - DATA_SERVICE_PORT=8000
            - ENGINE_MODE=remote
            - ORB_FILTER_GATE=${ORB_FILTER_GATE:-majority}
            - ORB_CNN_GATE=${ORB_CNN_GATE:-0}
            - NT_BRIDGE_HOST=${NT_BRIDGE_HOST:-100.113.72.63}
            - NT_BRIDGE_PORT=${NT_BRIDGE_PORT:-5680}
            - LOG_LEVEL=info
            - PYTHONPATH=/app/src
            - PYTHONUNBUFFERED=1
        volumes:
            - app_data:/app/data
            - ./models:/app/models
            - ./scripts:/app/scripts
        depends_on:
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "python",
                    "-c",
                    "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
                ]
            interval: 15s
            timeout: 5s
            start_period: 45s
            retries: 3

    # -------------------------------------------------------------------------
    # Web — HTMX Dashboard Frontend
    # Stateless reverse-proxy that serves the dashboard HTML and proxies all
    # API/SSE requests to the engine service. No Redis or Postgres access.
    # User-facing entry point at http://localhost:8180
    # -------------------------------------------------------------------------
    web:
        build:
            context: .
            dockerfile: docker/web/Dockerfile
        restart: unless-stopped
        ports:
            - "8180:8080"
        environment:
            - DATA_SERVICE_URL=http://engine:8000
            - WEB_HOST=0.0.0.0
            - WEB_PORT=8080
            - LOG_LEVEL=info
            - PYTHONPATH=/app/src
            - PYTHONUNBUFFERED=1
        depends_on:
            engine:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "python",
                    "-c",
                    "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
                ]
            interval: 15s
            timeout: 5s
            start_period: 15s
            retries: 3

    # -------------------------------------------------------------------------
    # Prometheus — Metrics collection & alerting     [monitoring profile]
    # Config is baked into the image via docker/monitoring/prometheus/Dockerfile.
    # UI at http://localhost:9095
    # -------------------------------------------------------------------------
    prometheus:
        profiles: [monitoring]
        build:
            context: .
            dockerfile: docker/monitoring/prometheus/Dockerfile
        restart: unless-stopped
        ports:
            - "9095:9090"
        volumes:
            - prometheus_data:/prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
            - "--web.console.libraries=/etc/prometheus/console_libraries"
            - "--web.console.templates=/etc/prometheus/consoles"
            - "--web.enable-lifecycle"

        depends_on:
            engine:
                condition: service_healthy

    # -------------------------------------------------------------------------
    # Grafana — Dashboards & visualization           [monitoring profile]
    # Provisioning configs and dashboards are baked into the image via
    # docker/monitoring/grafana/Dockerfile.
    # UI at http://localhost:3010  (admin / admin on first login)
    # -------------------------------------------------------------------------
    grafana:
        profiles: [monitoring]
        build:
            context: .
            dockerfile: docker/monitoring/grafana/Dockerfile
        restart: unless-stopped
        ports:
            - "3010:3000"
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
            - GF_USERS_ALLOW_SIGN_UP=false
        volumes:
            - grafana_data:/var/lib/grafana
        depends_on:
            - prometheus

volumes:
    postgres_data:
    redis_data:
    app_data:
    prometheus_data:
    grafana_data:
