services:
  sol-scalper:
    build:
      context: .
      dockerfile: docker/Dockerfile
    # Raspberry Pi 4 is ARM64. Uncomment the line below when building
    # ON the Pi itself, or when cross-building from an x86 host.
    # If building on the Pi directly this line is optional but harmless.
    platform: linux/arm64
    container_name: sol-scalper
    restart: unless-stopped
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # cap log size — important on Pi SD card
        max-file: "3"
